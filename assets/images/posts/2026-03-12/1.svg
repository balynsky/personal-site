<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Calibri, Segoe UI, Arial, sans-serif">
  <rect width="1000" height="560" fill="white"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-size="26" font-weight="700" fill="#333">Encryption Process</text>

  <!-- ============================================ -->
  <!-- TOP ROW: Three keys + Encrypted Item         -->
  <!-- MEK(100) → KEK(310) → DEK(520) → Encrypted(730) -->
  <!-- ============================================ -->

  <!-- MEK icon -->
  <g transform="translate(100,200)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#4ba3c3" stroke-width="3"/>
    <circle cx="0" cy="0" r="4" fill="#4ba3c3"/>
    <line x1="14" y1="0" x2="44" y2="0" stroke="#4ba3c3" stroke-width="3"/>
    <line x1="32" y1="0" x2="32" y2="9" stroke="#4ba3c3" stroke-width="3"/>
    <line x1="40" y1="0" x2="40" y2="9" stroke="#4ba3c3" stroke-width="3"/>
  </g>
  <text x="100" y="238" text-anchor="middle" font-size="15" font-weight="700" fill="#333">Master Encryption Key</text>
  <text x="100" y="258" text-anchor="middle" font-size="11.5" fill="#777">This key is used to</text>
  <text x="100" y="273" text-anchor="middle" font-size="11.5" fill="#777">encrypt/decrypt KEK</text>
  <text x="100" y="288" text-anchor="middle" font-size="11.5" fill="#777">using AES 256 bit</text>

  <!-- KEK icon -->
  <g transform="translate(310,200)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#4ba3c3" stroke-width="3"/>
    <circle cx="0" cy="0" r="4" fill="#4ba3c3"/>
    <line x1="14" y1="0" x2="44" y2="0" stroke="#4ba3c3" stroke-width="3"/>
    <line x1="32" y1="0" x2="32" y2="9" stroke="#4ba3c3" stroke-width="3"/>
    <line x1="40" y1="0" x2="40" y2="9" stroke="#4ba3c3" stroke-width="3"/>
  </g>
  <text x="310" y="238" text-anchor="middle" font-size="15" font-weight="700" fill="#333">Key Encryption Key</text>
  <text x="310" y="258" text-anchor="middle" font-size="11.5" fill="#777">This key is used to</text>
  <text x="310" y="273" text-anchor="middle" font-size="11.5" fill="#777">encrypt/decrypt DEK</text>
  <text x="310" y="288" text-anchor="middle" font-size="11.5" fill="#777">using AES 256 bit</text>

  <!-- DEK icon -->
  <g transform="translate(520,200)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#4ba3c3" stroke-width="3"/>
    <circle cx="0" cy="0" r="4" fill="#4ba3c3"/>
    <line x1="14" y1="0" x2="44" y2="0" stroke="#4ba3c3" stroke-width="3"/>
    <line x1="32" y1="0" x2="32" y2="9" stroke="#4ba3c3" stroke-width="3"/>
    <line x1="40" y1="0" x2="40" y2="9" stroke="#4ba3c3" stroke-width="3"/>
  </g>
  <text x="520" y="238" text-anchor="middle" font-size="15" font-weight="700" fill="#333">Data Encryption Key</text>
  <text x="520" y="258" text-anchor="middle" font-size="11.5" fill="#777">This key is used to</text>
  <text x="520" y="273" text-anchor="middle" font-size="11.5" fill="#777">encrypt/decrypt content</text>
  <text x="520" y="288" text-anchor="middle" font-size="11.5" fill="#777">using AES 256 bit</text>

  <!-- ============================================ -->
  <!-- Annotations & dashed arrows between keys     -->
  <!-- ============================================ -->

  <!-- Annotation MEK->KEK -->
  <text x="205" y="165" text-anchor="middle" font-size="10" fill="#999">Generated once after tenant</text>
  <text x="205" y="177" text-anchor="middle" font-size="10" fill="#999">register. Each tenant has its</text>
  <text x="205" y="189" text-anchor="middle" font-size="10" fill="#999">own key</text>

  <!-- Dashed arrow MEK -> KEK -->
  <line x1="165" y1="200" x2="255" y2="200" stroke="#bbb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="255,196 265,200 255,204" fill="#bbb"/>

  <!-- Annotation KEK->DEK -->
  <text x="415" y="172" text-anchor="middle" font-size="10" fill="#999">Generated for each content</text>
  <text x="415" y="184" text-anchor="middle" font-size="10" fill="#999">item downloaded</text>

  <!-- Dashed arrow KEK -> DEK -->
  <line x1="375" y1="200" x2="465" y2="200" stroke="#bbb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="465,196 475,200 465,204" fill="#bbb"/>

  <!-- ============================================ -->
  <!-- RIGHT SIDE: Raw Item + DEK arrow → Encrypted -->
  <!-- ============================================ -->

  <!-- Raw Item (document icon) — above the arrow level -->
  <g transform="translate(730,48)">
    <rect x="-22" y="-26" width="44" height="52" rx="2" fill="#f5f5f5" stroke="#ccc" stroke-width="1.2"/>
    <line x1="-12" y1="-10" x2="12" y2="-10" stroke="#ccc" stroke-width="1"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#ccc" stroke-width="1"/>
    <line x1="-12" y1="10" x2="12" y2="10" stroke="#ccc" stroke-width="1"/>
  </g>
  <text x="730" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Raw Item</text>

  <!-- Green arrow down from Raw Item to Encrypted Item -->
  <path d="M730,98 L730,150" stroke="#70ad47" stroke-width="2.5" fill="none"/>
  <polygon points="725,150 730,160 735,150" fill="#70ad47"/>

  <!-- Dashed arrow DEK -> Encrypted Item (same level as other arrows, y=200) -->
  <line x1="585" y1="200" x2="665" y2="200" stroke="#bbb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="665,196 675,200 665,204" fill="#bbb"/>

  <!-- Encrypted Item (document with lock) — centered on the arrow level -->
  <g transform="translate(730,200)">
    <rect x="-28" y="-32" width="56" height="64" rx="2" fill="#fbe9e7" stroke="#e57373" stroke-width="1.2"/>
    <circle cx="0" cy="-8" r="9" fill="none" stroke="#e57373" stroke-width="2"/>
    <rect x="-7" y="-1" width="14" height="11" rx="2" fill="#e57373"/>
  </g>
  <text x="730" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Encrypted Item</text>
  <text x="730" y="265" text-anchor="middle" font-size="12" fill="#333">+ metadata</text>

  <!-- ============================================ -->
  <!-- BOTTOM LEFT: MEK source — Provider KMS       -->
  <!-- ============================================ -->

  <!-- Gray arrow down from MEK -->
  <path d="M100,300 L100,350" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="96,350 100,360 104,350" fill="#bbb"/>

  <!-- KMS icon -->
  <g transform="translate(100,400)">
    <rect x="-40" y="-25" width="80" height="50" rx="5" fill="#fff8e1" stroke="#f9a825" stroke-width="1.2"/>
    <text x="0" y="-5" text-anchor="middle" font-size="11" font-weight="600" fill="#f57f17">Provider</text>
    <text x="0" y="12" text-anchor="middle" font-size="11" font-weight="600" fill="#f57f17">KMS</text>
  </g>
  <text x="100" y="445" text-anchor="middle" font-size="10" fill="#999">AWS KMS / GCP KMS</text>
  <text x="100" y="458" text-anchor="middle" font-size="10" fill="#999">/ Azure Key Vault</text>
  <text x="100" y="475" text-anchor="middle" font-size="10" fill="#999" font-style="italic">FIPS 140-2 validated</text>

  <!-- ============================================ -->
  <!-- BOTTOM CENTER-LEFT: KEK source — Catalog DB -->
  <!-- ============================================ -->

  <!-- Gray arrow down from KEK -->
  <path d="M310,300 L310,350" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="306,350 310,360 314,350" fill="#bbb"/>

  <!-- Catalog DB cylinder -->
  <g transform="translate(310,400)">
    <ellipse cx="0" cy="-25" rx="45" ry="12" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.2"/>
    <rect x="-45" y="-25" width="90" height="40" fill="#e3f2fd"/>
    <line x1="-45" y1="-25" x2="-45" y2="15" stroke="#64b5f6" stroke-width="1.2"/>
    <line x1="45" y1="-25" x2="45" y2="15" stroke="#64b5f6" stroke-width="1.2"/>
    <ellipse cx="0" cy="15" rx="45" ry="12" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.2"/>
    <ellipse cx="0" cy="-25" rx="45" ry="12" fill="#bbdefb" stroke="#64b5f6" stroke-width="1.2"/>
  </g>
  <text x="310" y="440" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Catalog DB</text>

  <!-- ============================================ -->
  <!-- BOTTOM CENTER-RIGHT: DEK source — Account DB -->
  <!-- ============================================ -->

  <!-- Gray arrow down from DEK -->
  <path d="M520,300 L520,350" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="516,350 520,360 524,350" fill="#bbb"/>

  <!-- Account DB cylinder -->
  <g transform="translate(520,400)">
    <ellipse cx="0" cy="-25" rx="45" ry="12" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.2"/>
    <rect x="-45" y="-25" width="90" height="40" fill="#e3f2fd"/>
    <line x1="-45" y1="-25" x2="-45" y2="15" stroke="#64b5f6" stroke-width="1.2"/>
    <line x1="45" y1="-25" x2="45" y2="15" stroke="#64b5f6" stroke-width="1.2"/>
    <ellipse cx="0" cy="15" rx="45" ry="12" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.2"/>
    <ellipse cx="0" cy="-25" rx="45" ry="12" fill="#bbdefb" stroke="#64b5f6" stroke-width="1.2"/>
  </g>
  <text x="520" y="440" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Account DB</text>

  <!-- ============================================ -->
  <!-- RIGHT: Stored object metadata                -->
  <!-- ============================================ -->

  <g transform="translate(895,200)">
    <rect x="-85" y="-25" width="180" height="185" rx="5" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
    <text x="0" y="-2" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Stored object metadata</text>
    <circle cx="-65" cy="22" r="3" fill="#333"/>
    <text x="-55" y="26" text-anchor="start" font-size="11" fill="#666">Encryption KEK Id</text>
    <circle cx="-65" cy="40" r="3" fill="#333"/>
    <text x="-55" y="44" text-anchor="start" font-size="11" fill="#666">Wrapped DEK</text>
    <circle cx="-65" cy="58" r="3" fill="#333"/>
    <text x="-55" y="62" text-anchor="start" font-size="11" fill="#666">Encrypt Check value</text>
    <circle cx="-65" cy="76" r="3" fill="#333"/>
    <text x="-55" y="80" text-anchor="start" font-size="11" fill="#666">Encryption Key length</text>
    <circle cx="-65" cy="94" r="3" fill="#333"/>
    <text x="-55" y="98" text-anchor="start" font-size="11" fill="#666">Encryption Key algorithm</text>
    <circle cx="-65" cy="112" r="3" fill="#333"/>
    <text x="-55" y="116" text-anchor="start" font-size="11" fill="#666">Wrapping Key algorithm</text>
    <circle cx="-65" cy="130" r="3" fill="#333"/>
    <text x="-55" y="134" text-anchor="start" font-size="11" fill="#666">Encryption IV</text>
    <circle cx="-65" cy="148" r="3" fill="#333"/>
    <text x="-55" y="152" text-anchor="start" font-size="11" fill="#666">Content MD5</text>
  </g>

  <!-- ============================================ -->
  <!-- BOTTOM RIGHT: Cloud Storage providers        -->
  <!-- ============================================ -->

  <!-- Green arrow from encrypted item down to cloud -->
  <path d="M730,275 L730,380" stroke="#70ad47" stroke-width="2.5" fill="none"/>
  <polygon points="725,380 730,392 735,380" fill="#70ad47"/>

  <!-- Cloud shape — below Encrypted Item -->
  <g transform="translate(730,440)">
    <ellipse cx="-35" cy="0" rx="30" ry="22" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
    <ellipse cx="0" cy="-10" rx="35" ry="24" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
    <ellipse cx="35" cy="0" rx="30" ry="22" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
    <ellipse cx="0" cy="8" rx="48" ry="18" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
    <ellipse cx="0" cy="2" rx="42" ry="19" fill="#e8f5e9"/>
  </g>
  <text x="730" y="438" text-anchor="middle" font-size="10" font-weight="600" fill="#388e3c">AWS S3 / GCS</text>
  <text x="730" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#388e3c">/ Azure Blob</text>

</svg>
